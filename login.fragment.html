<div class="login-box">
    <div class="login-brand">
        <img src="/assets/logo-dmf.png" alt="DMF Empreendimentos" class="login-logo">
    </div>
    <h2 class="login-title">DMF Empreendimentos</h2>
    <p class="login-subtitle">Acesso seguro ao sistema financeiro empresarial.</p>

    <div class="form-group">
        <div class="login-field">
            <label for="loginInput" class="sr-only">Usuário ou Email</label>
            <span class="login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="loginInput" placeholder="Usuário ou Email" class="styled-input has-icon" autocomplete="username">
        </div>
        <div class="login-field">
            <label for="loginPass" class="sr-only">Senha</label>
            <span class="login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="loginPass" placeholder="Senha" class="styled-input has-icon has-toggle" autocomplete="current-password">
            <button type="button" id="togglePass" class="login-pass-toggle" aria-label="Mostrar senha" aria-pressed="false">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
        </div>
    </div>

    <button id="btnLogin" class="btn btn-primary btn-full login-submit">Acessar Sistema</button>
    <p id="loginStatus" class="login-helper">Acesso restrito a colaboradores autorizados.</p>
</div>
